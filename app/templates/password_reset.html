{% extends "base.html" %}
{% set title = "重置密码" %}
{% block content %}
<section class="card">
    <h1>重置密码</h1>
    {% if error %}<p class="notice error">{{ error }}</p>{% endif %}
    <form method="post" action="/password/reset" class="form-grid full">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <input type="hidden" name="token" value="{{ token }}">
        <label>新密码
            <input type="password" name="password" required minlength="6">
        </label>
        <div class="button-row">
            <button class="primary" type="submit">确认重置</button>
        </div>
    </form>
</section>
{% endblock %}
