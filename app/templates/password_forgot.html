{% extends "base.html" %}
{% set title = "找回密码" %}
{% block content %}
<section class="card">
    <h1>找回密码</h1>
    {% if error %}<p class="notice error">{{ error }}</p>{% endif %}
    {% if notice %}<p class="notice success">{{ notice }}</p>{% endif %}
    <form method="post" action="/password/forgot" class="form-grid full">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <label>邮箱
            <input type="email" name="email" required>
        </label>
        <div class="button-row">
            <button class="primary" type="submit">发送重置邮件</button>
            <a class="ghost-link" href="/login">返回登录</a>
        </div>
    </form>
</section>
{% endblock %}
