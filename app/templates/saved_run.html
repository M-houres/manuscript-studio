{% extends "base.html" %}
{% set title = "历史结果" %}
{% block content %}
<section class="card">
    <h1>历史结果</h1>
    <p class="muted">类型：{{ kind }} · 模型：{{ run.model_alias }} · 时间：{{ run.created_at.strftime("%Y-%m-%d %H:%M") }}</p>
    <pre class="output-text">{{ payload_text }}</pre>
    <div class="button-row">
        <a class="ghost-link" href="/history">返回历史列表</a>
    </div>
</section>
{% endblock %}
